{% extends 'base.html' %}

{% block head %}
<style>
    body {
        background-color: var(--bg-light);
    }

    .reset-password-card {
        max-width: 450px;
        margin: auto;
        margin-top: 80px;
        padding: 30px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }

    .reset-password-logo {
        max-width: 200px;
        display: block;
        margin: auto;
        margin-bottom: 20px;
    }
</style>
{% endblock %}

{% block content %}

<div class="reset-password-card">

    <img src="/media/base/icon/top_bar/top-bar-logo.png"
         class="reset-password-logo"
         alt="Logo">

    <h3 class="text-center mb-4" style="color: var(--primary);">
        Reset Password
    </h3>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input
                type="password"
                name="new_password"
                class="form-control"
                required
            >
        </div>

        <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input
                type="password"
                name="confirm_password"
                class="form-control"
                required
            >
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Reset Password
        </button>
    </form>

    {% if messages %}
    <div class="mt-3">
        {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'success' %}success{% else %}danger{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
    {% endif %}

</div>

{% endblock %}
