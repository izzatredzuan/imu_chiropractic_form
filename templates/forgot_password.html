{% extends "base.html" %}

{% block head %}
<style>
    body {
        background-color: var(--bg-light);
    }

    .forget-password-card {
        max-width: 420px;
        margin: auto;
        margin-top: 80px;
        padding: 30px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .forget-password-logo {
        max-width: 200px;
        display: block;
        margin: auto;
        margin-bottom: 20px;
    }
</style>
{% endblock %}

{% block content %}
<div class="forget-password-card">
    <img src="/media/base/icon/top_bar/top-bar-logo.png" class="forget-password-logo" alt="Logo">

    <h3 class="text-center mb-4">
        Forgot Password
    </h3>

    <p class="text-muted">
        Enter your username. If an account exists, we'll send password reset instructions to the registered email address.
    </p>

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input
                type="text"
                name="username"
                class="form-control"
                required>
        </div>

        <button class="btn btn-primary w-100">
            Send Reset Link
        </button>

    </form>

</div>

{% endblock %}
